<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #f1f5f9;
    }
    .logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .brand-name {
      font-size: 13px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -0.4px;
    }
    .brand-tagline {
      font-size: 10px;
      color: #94a3b8;
      font-weight: 500;
      margin-top: 1px;
    }

    /* ── Page preview ── */
    .page-info {
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #f8fafc;
      border-bottom: 1px solid #f1f5f9;
      min-height: 60px;
    }
    #pageFavicon {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      flex-shrink: 0;
      margin-top: 2px;
      object-fit: contain;
      background: #e2e8f0;
    }
    .favicon-placeholder {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      background: #e2e8f0;
      flex-shrink: 0;
      margin-top: 2px;
    }
    #pageTitle {
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #pageHost {
      font-size: 10px;
      color: #94a3b8;
      font-weight: 500;
      margin-top: 3px;
    }

    /* ── Action area ── */
    .actions {
      padding: 14px 16px 16px;
    }

    #saveBtn {
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      padding: 11px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: -0.1px;
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    #saveBtn:hover:not(:disabled) {
      background: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(37,99,235,0.28);
    }
    #saveBtn:active:not(:disabled) { transform: translateY(0); box-shadow: none; }
    #saveBtn:disabled { background: #e2e8f0; color: #94a3b8; cursor: default; }
    #saveBtn.state-saved { background: #059669; }
    #saveBtn.state-saved:hover:not(:disabled) { background: #047857; box-shadow: 0 6px 16px rgba(5,150,105,0.24); }
    #saveBtn.state-exists { background: #f1f5f9; color: #64748b; }

    #status {
      margin-top: 10px;
      font-size: 11.5px;
      font-weight: 500;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #64748b;
    }
    #status.success { color: #059669; }
    #status.error   { color: #dc2626; }

    /* spinner inside button */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.success { background: #059669; }
    .status-dot.error   { background: #dc2626; }

    /* ── Login View ── */
    #loginView {
      padding: 20px 16px;
      display: none;
    }
    .input-group {
      margin-bottom: 12px;
    }
    .input-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .input-group input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
    }
    #loginBtn {
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      padding: 11px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      margin-top: 8px;
      transition: background 0.15s, transform 0.12s;
    }
    #loginBtn:hover { background: #1d4ed8; transform: translateY(-1px); }
    #loginBtn:active { transform: translateY(0); }
    #loginBtn:disabled { background: #e2e8f0; color: #94a3b8; cursor: default; }

    .login-footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
    }

    /* ── Main View ── */
    #mainView {
      display: block;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      justify-content: flex-end;
    }
    #logoutBtn {
      font-size: 11px;
      color: #94a3b8;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    #logoutBtn:hover {
      background: #f1f5f9;
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <img src="logo.png" alt="sonra-okurum" />
    </div>
    <div>
      <div class="brand-name">sonra-okurum</div>
      <div id="brandTagline" class="brand-tagline">sonra oku.</div>
    </div>
  </div>

  <div id="loginView">
    <div class="input-group">
      <label id="labelEmail" for="email">Email</label>
      <input type="email" id="email" placeholder="email@example.com" required>
    </div>
    <div class="input-group">
      <label id="labelPassword" for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    <button id="loginBtn">
      <span id="loginBtnText">Log In</span>
    </button>
    <div id="loginStatus"></div>
    <div class="login-footer" id="loginFooter">
      sonra-okurum extension
    </div>
  </div>

  <div id="mainView">
    <div class="page-info">
      <img id="pageFavicon" style="display:none" alt="" />
      <div id="faviconPlaceholder" class="favicon-placeholder"></div>
      <div>
        <div id="pageTitle" style="color:#94a3b8;font-weight:500">sayfa yükleniyor…</div>
        <div id="pageHost"></div>
      </div>
    </div>

    <div class="actions">
      <button id="saveBtn">
        <span id="btnText">kütüphaneye kaydet</span>
      </button>
      <div id="status"></div>
    </div>

    <div class="footer">
      <button id="logoutBtn">Çıkış Yap</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
