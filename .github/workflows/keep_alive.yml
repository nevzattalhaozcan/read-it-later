name: Keep Alive
on:
  schedule:
    - cron: '*/14 * * * *' # Every 14 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          if [ -z "${{ secrets.VITE_API_URL }}" ]; then
            echo "VITE_API_URL secret is not set. Skipping ping."
            exit 0
          fi
          # Ensure URL doesn't end with slash before appending /api/v1/ping
          BASE_URL=$(echo "${{ secrets.VITE_API_URL }}" | sed 's/\/$//')
          curl -f "$BASE_URL/api/v1/ping"
